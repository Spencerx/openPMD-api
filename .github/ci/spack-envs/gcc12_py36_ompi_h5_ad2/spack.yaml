# This is a Spack environment file.
#
# Activating and installing this environment will provide all dependencies
# that are needed for full-feature development.
#   https//spack.readthedocs.io/en/latest/environments.html#anonymous-environments
#
spack:
  specs:
  - adios2@2.10
  - hdf5
  - openmpi
  - py-h5py

  packages:
    adios2:
      # mgard not supported on CMake 4.0 due to unresolved compatibility
      # issue in dependency yaml-cpp
      # https://github.com/jbeder/yaml-cpp/issues/1352
      variants: ~zfp ~sz ~png ~dataman ~python ~fortran ~ssc ~shared ~bzip2 ~mgard
    c-blosc2:
      # snappy broken on CMake 4.0
      # fixed snappy not yet deployed to a Spack release
      variants: ~snappy
    cmake:
      externals:
      - spec: cmake@3.31.5
        prefix: /usr
      buildable: False
    openmpi:
      externals:
      - spec: openmpi@4.1.2
        prefix: /usr
      buildable: False
    perl:
      externals:
      - spec: perl@5.34.0
        prefix: /usr
      buildable: False
    python:
      externals:
      - spec: python@3.10.12
        prefix: /usr
      buildable: False
    all:
      target: [x86_64]
      variants: ~fortran
      compiler: [gcc@12.3.0]

  compilers:
  - compiler:
      environment: {}
      extra_rpaths: []
      flags: {}
      modules: []
      operating_system: ubuntu22.04
      paths:
        cc: /usr/bin/gcc-12
        cxx: /usr/bin/g++-12
        f77: /usr/bin/gfortran
        fc: /usr/bin/gfortran
      spec: gcc@12.3.0
      target: x86_64

  config:
    build_jobs: 2

  mirrors:
    E4S: https://cache.e4s.io
